<!DOCTYPE html><html lang="sv"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mickes Reselogger</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head><body>
<header><h1>Mickes Reselogger</h1></header>
<div class="version">BUILD: OnloadFix B1 (A2-2)</div>
<div id="appRoot">
  <div id="map"></div>
  <section class="panel">
    <div class="row startstop">
      <button id="startBtn">Starta</button>
      <button id="stopBtn" disabled>Stoppa</button>
      <button id="followBtn">Följ mig</button>
    </div>
    <div class="row metrics">
      <div>GPS‑punkter: <span id="pts">0</span></div>
      <div>Totalt km: <span id="totkm">0.00</span></div>
    </div>
    <div class="row exportNow"><button id="exportNowBtn" disabled>Exportera aktuell resa (kolumnvis med ort)</button></div>
    <div class="row dates">
      <label>Från: <input type="date" id="fromDate"></label>
      <label>Till: <input type="date" id="toDate"></label>
    </div>
    <button id="exportRangeBtn">Exportera period (Excel)</button>
    <div class="row dangerRow">
      <button id="cleanEmptyBtn" class="danger">Rensa tomma resor</button>
      <button id="clearAllBtn" class="danger">Rensa ALL historik</button>
    </div>
    <p id="status">Status: Inaktiv</p>
  </section>
</div>
<script src="app.js"></script>
</body></html>
