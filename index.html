
<!DOCTYPE html><html lang='sv'><head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Reselogger</title>
<link rel='stylesheet' href='styles.css?v-excel-daterange-5'>
<link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css'>
<script src='https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js'></script>
<script src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'></script>
</head><body>
<header><h1>Reselogger</h1></header>
<div id='version' class='version'>BUILD: v-excel-daterange-5</div>
<div id='map'></div>
<section class='panel'>
  <div class='row startstop'>
    <button id='startBtn'>Starta</button>
    <button id='stopBtn' disabled>Stoppa</button>
  </div>
  <div class='row'>
    <button id='followBtn'>Följ mig</button>
    <button id='exportExcelBtn' disabled>Exportera aktuell resa (kolumnvis med ort)</button>
  </div>
  <div class='row dates'>
    <label>Från: <input type='date' id='fromDate'></label>
    <label>Till: <input type='date' id='toDate'></label>
  </div>
  <div class='row'>
    <button id='exportRangeBtn'>Exportera period (Excel)</button>
  </div>
  <div class='row info'>
    <div>GPS‑punkter: <span id='ptCount'>0</span></div>
    <div>Senaste fix: <span id='lastFix'>–</span></div>
  </div>
  <div class='row'>
    <button id='cleanEmptyBtn' class='danger'>Rensa tomma resor</button>
    <button id='clearAllBtn' class='danger'>Rensa ALL historik</button>
  </div>
  <p id='status'>Status: Inaktiv</p>
  <p id='km'>Totalt: 0 km</p>
</section>
<script src='app.js?v-excel-daterange-5'></script>
</body></html>
